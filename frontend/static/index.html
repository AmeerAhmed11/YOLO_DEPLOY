<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO Vertex AI | Vehicle & Accident Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header class="glass-header">
        <div class="logo-container">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="8" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                    <path d="M16 12v.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>YOLO TensorRT <span>Vertex AI</span></h1>
        </div>
        <div class="status-indicator">
            <span class="status-dot connected"></span>
            <span id="system-status">System Ready</span>
        </div>
    </header>

    <main class="container">
        <div class="layout-grid">
            
            <!-- Left Column: Upload & Controls -->
            <div class="controls-panel">
                <div class="glass-card">
                    <h2>Upload Media</h2>
                    <p class="subtitle">Supports PNG, JPG, MP4, AVI</p>
                    
                    <div id="drop-zone" class="drop-zone">
                        <input type="file" id="file-input" accept="image/*,video/*" hidden>
                        <div class="upload-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke-linecap="round" stroke-linejoin="round"/>
                                <polyline points="17 8 12 3 7 8" stroke-linecap="round" stroke-linejoin="round"/>
                                <line x1="12" y1="3" x2="12" y2="15" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <p>Drag and drop your file here, or <span class="text-gradient">browse</span></p>
                    </div>

                    <div class="settings-group">
                        <label for="conf-slider">Confidence Threshold: <span id="conf-val">25%</span></label>
                        <input type="range" id="conf-slider" min="1" max="100" value="25">
                    </div>

                    <button id="btn-infer" class="primary-btn" disabled>
                        <span>Run Inference</span>
                        <div class="spinner" id="btn-spinner"></div>
                    </button>
                    
                    <button id="btn-download" class="secondary-btn" style="display:none;">
                        Download Result
                    </button>
                </div>

                <div class="glass-card stats-card">
                    <h2>Detection Stats</h2>
                    <div class="stat-grid">
                        <div class="stat-box">
                            <span class="stat-value" id="stat-total">0</span>
                            <span class="stat-label">Total Objects</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-value" id="stat-latency">- ms</span>
                            <span class="stat-label">Inference Time</span>
                        </div>
                    </div>
                    
                    <h3>Classes Detected</h3>
                    <div class="class-chips" id="class-chips-container">
                        <!-- Chips inserted dynamically -->
                    </div>
                </div>
            </div>

            <!-- Right Column: Preview & Results -->
            <div class="results-panel">
                <div class="glass-card full-height">
                    <div class="preview-container" id="preview-container">
                        <div class="empty-state" id="empty-state">
                            <p>No media uploaded</p>
                        </div>
                        <img id="image-preview" src="" style="display:none;" alt="Preview">
                        <video id="video-preview" style="display:none;" controls muted></video>
                        <canvas id="result-canvas"></canvas>
                        
                        <!-- Video Processing Progress overlay -->
                        <div id="video-progress-overlay" class="progress-overlay" style="display:none;">
                            <div class="progress-box">
                                <h3>Processing Video...</h3>
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" id="progress-fill"></div>
                                </div>
                                <p id="progress-text">Extracting frames</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/static/app.js"></script>
</body>
</html>
